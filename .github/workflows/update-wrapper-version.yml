name: Update AST CLI Java Wrapper Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Specify a version (e.g., 1.2.3). Leave empty for the latest official version."
        required: false
        default: ""
      base_branch:
        description: "Target branch for PR (e.g., main, demo). Leave empty for default branch."
        required: false
        default: ""
  repository_dispatch:
    types: [java-wrapper-version-update]

permissions:
  contents: read

jobs:
  update-java-wrapper:
    runs-on: cx-public-ubuntu-x64
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.base_branch || github.event.repository.default_branch }}

      - name: Determine Version
        id: get_version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_CLI_VERSION: ${{ github.event.client_payload.cli_version }}
        run: |
          # Check for manual workflow_dispatch input first
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          # Then check for repository_dispatch payload
          elif [[ -n "$DISPATCH_CLI_VERSION" ]]; then
            VERSION="$DISPATCH_CLI_VERSION"
          # Fall back to fetching latest version
          else
            VERSION=$(curl -s "https://api.github.com/repos/Checkmarx/ast-cli-java-wrapper/releases" | jq -r '[.[] | .tag_name | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(split(".") | map(tonumber)) | .[-1]')
          fi

          # Remove leading 'v' if present
          VERSION="${VERSION#v}"

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to determine a valid version."
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match '<major>.<minor>.<patch>'."
            exit 1
          fi

          echo "Normalized version (without leading 'v'): $VERSION"
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update gradle.properties File
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          sed -i "s|defaultJavaWrapperVersion=[0-9]*\\.[0-9]*\\.[0-9]*|defaultJavaWrapperVersion=${VERSION}|" gradle.properties

      - name: Commit Changes
        shell: bash
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add gradle.properties
          git commit -m "Update AST CLI Java Wrapper to version ${VERSION}"

      - name: Create Pull Request
        uses: step-security/create-pull-request@50c103da2b9ca12cd5bc013fc6931051a5aa872b # v8.1.1
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          commit-message: Update AST CLI Java Wrapper to version ${{ steps.get_version.outputs.version }}
          title: Update AST CLI Java Wrapper to version ${{ steps.get_version.outputs.version }}
          body: |
            Updates the AST CLI Java Wrapper to version `${{ steps.get_version.outputs.version }}`

            Auto-generated by [create-pull-request][2]
          base: ${{ github.event.inputs.base_branch || github.event.repository.default_branch }}
          labels: cxone
          branch: other/update_java_wrapper_${{ steps.get_version.outputs.version }}
